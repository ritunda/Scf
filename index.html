<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>St. Camillus Families • Alumni Network</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* same styles as before – keep them exactly as in your previous working version */
    * { font-family: 'Inter', sans-serif; }
    body { background: #f4f2ee; scroll-behavior: smooth; }
    .vote-column { min-width: 48px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .vote-arrow { cursor: pointer; transition: all 0.2s; color: #878a8c; font-size: 1.5rem; line-height: 1; }
    .vote-arrow:hover { color: #ff4500; transform: scale(1.1); }
    .vote-count { font-weight: 600; font-size: 0.9rem; color: #1c1c1c; }
    .post-card { transition: all 0.25s ease; }
    .post-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
    .btn-primary { background-color: #0a66c2; color: white; border-radius: 9999px; padding: 8px 20px; font-weight: 600; transition: background 0.2s; }
    .btn-primary:hover { background-color: #004182; }
    .btn-outline { border: 1px solid #0a66c2; color: #0a66c2; background: white; border-radius: 9999px; padding: 6px 16px; font-weight: 600; transition: all 0.2s; }
    .btn-outline:hover { background: #e8f0fe; }
    .tab-active { border-bottom: 2px solid #0a66c2; color: #0a66c2; font-weight: 600; }
    .profile-cover { background: linear-gradient(135deg, #0a66c2, #004182); height: 120px; border-radius: 1rem 1rem 0 0; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-up { animation: fadeInUp 0.4s ease-out; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #e9e9e9; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #b3b3b3; border-radius: 10px; }
    .like-btn, .save-btn { transition: all 0.2s; cursor: pointer; }
    .like-btn:hover, .save-btn:hover { transform: scale(1.05); }
    .comment-vote { font-size: 0.8rem; cursor: pointer; transition: all 0.1s; }
    .comment-vote:hover { transform: scale(1.1); }
    .dropdown { position: relative; display: inline-block; }
    .dropdown-content { display: none; position: absolute; right: 0; background-color: white; min-width: 120px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-radius: 8px; z-index: 1; }
    .dropdown-content a { color: black; padding: 8px 12px; text-decoration: none; display: block; font-size: 0.8rem; }
    .dropdown-content a:hover { background-color: #f1f1f1; }
  </style>
</head>
<body>

  <!-- AUTH CONTAINER -->
  <div id="authContainer" class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-6 animate-fade-up">
      <div class="text-center mb-6">
        <i class="fa-solid fa-hand-holding-heart text-4xl text-[#0a66c2]"></i>
        <h2 class="text-2xl font-bold mt-2">St. Camillus Families</h2>
        <p class="text-gray-500">Enter your invite code to continue</p>
      </div>
      <div id="inviteStep">
        <input type="text" id="inviteCode" placeholder="Invite Code" class="w-full p-3 border border-gray-300 rounded-lg mb-4">
        <button onclick="verifyInviteCode()" class="btn-primary w-full">Verify</button>
      </div>
      <div id="authStep" class="hidden">
        <div class="flex gap-2 mb-4">
          <button id="showLoginBtn" class="flex-1 py-2 border-b-2 border-[#0a66c2] font-semibold">Login</button>
          <button id="showSignupBtn" class="flex-1 py-2 text-gray-500">Sign Up</button>
        </div>
        <div id="loginForm">
          <input type="email" id="loginEmail" placeholder="Email" class="w-full p-3 border border-gray-300 rounded-lg mb-3">
          <input type="password" id="loginPassword" placeholder="Password" class="w-full p-3 border border-gray-300 rounded-lg mb-4">
          <button onclick="login()" class="btn-primary w-full">Login</button>
        </div>
        <div id="signupForm" class="hidden">
          <input type="email" id="signupEmail" placeholder="Email" class="w-full p-3 border border-gray-300 rounded-lg mb-3">
          <input type="password" id="signupPassword" placeholder="Password" class="w-full p-3 border border-gray-300 rounded-lg mb-4">
          <button onclick="signup()" class="btn-primary w-full">Sign Up</button>
        </div>
      </div>
      <div id="errorMsg" class="text-red-600 text-sm mt-4 text-center"></div>
    </div>
  </div>

  <!-- MAIN APP CONTAINER (initially hidden) -->
  <div id="appContainer" class="hidden">
    <header class="sticky top-0 z-50 bg-white border-b border-gray-200 shadow-sm">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
          <div class="flex items-center gap-2">
            <i class="fa-solid fa-hand-holding-heart text-3xl text-[#0a66c2]"></i>
            <span class="text-xl font-bold text-gray-900 hidden sm:inline">St. Camillus Families</span>
            <span class="text-xl font-bold text-gray-900 sm:hidden">SCF</span>
          </div>
          <div class="flex-1 max-w-md mx-4 hidden md:block">
            <div class="relative">
              <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
              <input id="globalSearch" type="text" placeholder="Search alumni, jobs, events..." class="w-full pl-10 pr-4 py-2 rounded-full bg-gray-100 border border-transparent focus:border-[#0a66c2] focus:bg-white focus:outline-none">
            </div>
          </div>
          <div class="flex items-center gap-2 sm:gap-4">
            <nav class="hidden md:flex gap-1">
              <button id="navFeed" class="tab-btn px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">Feed</button>
              <button id="navDirectory" class="tab-btn px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">Directory</button>
              <button id="navJobs" class="tab-btn px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">Jobs</button>
              <button id="navMentorship" class="tab-btn px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">Mentorship</button>
              <button id="navEvents" class="tab-btn px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">Events</button>
              <button id="navMessages" class="tab-btn px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100">Messages</button>
              <button id="navAdmin" class="tab-btn px-3 py-1 rounded-full text-gray-600 hover:bg-gray-100 hidden">Admin</button>
            </nav>
            <div class="relative cursor-pointer" id="notifIcon">
              <i class="fa-regular fa-bell text-2xl text-gray-600"></i>
              <span id="notifBadge" class="absolute -top-1 -right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 rounded-full">0</span>
            </div>
            <div id="profileBtn" class="flex items-center gap-2 cursor-pointer bg-gray-100 rounded-full pl-1 pr-3 py-1 hover:bg-gray-200 transition">
              <div class="w-8 h-8 bg-[#0a66c2] rounded-full flex items-center justify-center text-white font-bold text-sm">👤</div>
              <span class="text-sm font-medium text-gray-700 hidden sm:inline" id="userNameDisplay">Alumni</span>
            </div>
            <button id="logoutBtn" class="text-sm text-gray-500 hover:text-red-600 ml-2">Logout</button>
          </div>
        </div>
      </div>
      <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-50">
        <button id="mobileFeed" class="flex flex-col items-center text-xs text-gray-600"><i class="fa-solid fa-house text-xl"></i><span>Feed</span></button>
        <button id="mobileDirectory" class="flex flex-col items-center text-xs text-gray-600"><i class="fa-solid fa-users text-xl"></i><span>Directory</span></button>
        <button id="mobileJobs" class="flex flex-col items-center text-xs text-gray-600"><i class="fa-solid fa-briefcase text-xl"></i><span>Jobs</span></button>
        <button id="mobileMentorship" class="flex flex-col items-center text-xs text-gray-600"><i class="fa-solid fa-handshake text-xl"></i><span>Mentor</span></button>
        <button id="mobileEvents" class="flex flex-col items-center text-xs text-gray-600"><i class="fa-solid fa-calendar text-xl"></i><span>Events</span></button>
        <button id="mobileMessages" class="flex flex-col items-center text-xs text-gray-600"><i class="fa-solid fa-envelope text-xl"></i><span>Messages</span></button>
        <button id="mobileAdmin" class="flex flex-col items-center text-xs text-gray-600 hidden"><i class="fa-solid fa-gavel text-xl"></i><span>Admin</span></button>
      </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 pb-20 md:pb-6">
      <div id="appContent"></div>
    </div>

    <!-- MODALS (same as before – copy from your monolithic version) -->
    <div id="postModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl max-w-2xl w-full shadow-xl animate-fade-up">
        <div class="px-6 py-4 border-b flex justify-between items-center">
          <h2 class="text-xl font-bold">Create a post</h2>
          <i onclick="closePostModal()" class="fa-solid fa-xmark cursor-pointer text-gray-500 hover:text-gray-700"></i>
        </div>
        <div class="p-6">
          <textarea id="postContent" rows="5" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-[#0a66c2]" placeholder="Share something with the community..."></textarea>
          <div class="mt-3 flex flex-wrap gap-4">
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="anonymousPost"> Post anonymously</label>
            <select id="postSpecialty" class="border border-gray-300 rounded-full px-3 py-1 text-sm">
              <option value="">Specialty (optional)</option>
              <option>ICU</option><option>ER</option><option>Pediatrics</option><option>Oncology</option>
            </select>
          </div>
          <div onclick="document.getElementById('postImage').click()" class="mt-6 border-2 border-dashed border-gray-300 rounded-2xl p-6 text-center cursor-pointer hover:border-[#0a66c2] transition">
            <input type="file" id="postImage" accept="image/*" class="hidden" onchange="handleImageSelect(event)">
            <i class="fa-solid fa-cloud-upload-alt text-4xl text-gray-400"></i>
            <div id="imageNameDisplay" class="mt-2 text-sm text-gray-500"></div>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button onclick="publishPost()" class="btn-primary">Post</button>
        </div>
      </div>
    </div>

    <div id="editPostModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl max-w-2xl w-full shadow-xl animate-fade-up">
        <div class="px-6 py-4 border-b flex justify-between items-center">
          <h2 class="text-xl font-bold">Edit Post</h2>
          <i onclick="closeEditPostModal()" class="fa-solid fa-xmark cursor-pointer text-gray-500 hover:text-gray-700"></i>
        </div>
        <div class="p-6">
          <textarea id="editPostContent" rows="5" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:border-[#0a66c2]"></textarea>
          <div class="mt-3 flex flex-wrap gap-4">
            <label class="flex items-center gap-2 text-sm"><input type="checkbox" id="editAnonymousPost"> Post anonymously</label>
            <select id="editPostSpecialty" class="border border-gray-300 rounded-full px-3 py-1 text-sm">
              <option value="">Specialty (optional)</option>
              <option>ICU</option><option>ER</option><option>Pediatrics</option><option>Oncology</option>
            </select>
          </div>
          <div onclick="document.getElementById('editPostImage').click()" class="mt-6 border-2 border-dashed border-gray-300 rounded-2xl p-6 text-center cursor-pointer hover:border-[#0a66c2] transition">
            <input type="file" id="editPostImage" accept="image/*" class="hidden" onchange="handleEditImageSelect(event)">
            <div id="editImageNameDisplay" class="mt-2 text-sm text-gray-500"></div>
          </div>
        </div>
        <div class="px-6 py-4 border-t flex justify-end">
          <button onclick="saveEditedPost()" class="btn-primary">Save Changes</button>
        </div>
      </div>
    </div>

    <div id="messageModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl max-w-md w-full p-6">
        <h2 class="text-xl font-bold mb-4">Send Message</h2>
        <textarea id="messageContent" rows="4" placeholder="Type your message..." class="w-full border border-gray-300 rounded-lg p-2"></textarea>
        <div class="flex justify-end gap-3 mt-4">
          <button onclick="closeMessageModal()" class="px-4 py-2 border border-gray-300 rounded-full">Cancel</button>
          <button onclick="sendMessage()" class="btn-primary">Send</button>
        </div>
      </div>
    </div>

    <div id="reportModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl max-w-md w-full p-6">
        <h2 class="text-xl font-bold mb-4">Report</h2>
        <textarea id="reportReason" rows="3" placeholder="Why are you reporting this?" class="w-full border border-gray-300 rounded-lg p-2"></textarea>
        <div class="flex justify-end gap-3 mt-4">
          <button onclick="closeReportModal()" class="px-4 py-2 border border-gray-300 rounded-full">Cancel</button>
          <button onclick="submitReport()" class="btn-primary">Submit Report</button>
        </div>
      </div>
    </div>

    <div id="jobModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl max-w-2xl w-full p-6">
        <h2 class="text-xl font-bold mb-4">Post a Job</h2>
        <input id="jobTitle" placeholder="Title" class="w-full mb-3 p-2 border border-gray-300 rounded-lg">
        <input id="jobEmployer" placeholder="Employer/Hospital" class="w-full mb-3 p-2 border border-gray-300 rounded-lg">
        <input id="jobLocation" placeholder="Location" class="w-full mb-3 p-2 border border-gray-300 rounded-lg">
        <textarea id="jobDescription" rows="4" placeholder="Description" class="w-full mb-3 p-2 border border-gray-300 rounded-lg"></textarea>
        <div class="flex justify-end gap-3">
          <button onclick="closeJobModal()" class="px-4 py-2 border border-gray-300 rounded-full">Cancel</button>
          <button onclick="createJob()" class="btn-primary">Publish</button>
        </div>
      </div>
    </div>

    <div id="eventModal" class="hidden fixed inset-0 bg-black/50 backdrop-blur-sm z-[9999] flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl max-w-2xl w-full p-6">
        <h2 class="text-xl font-bold mb-4">Create Event</h2>
        <input id="eventTitle" placeholder="Title" class="w-full mb-3 p-2 border border-gray-300 rounded-lg">
        <input id="eventDate" type="datetime-local" class="w-full mb-3 p-2 border border-gray-300 rounded-lg">
        <input id="eventLocation" placeholder="Location or Virtual Link" class="w-full mb-3 p-2 border border-gray-300 rounded-lg">
        <textarea id="eventDescription" rows="3" placeholder="Description" class="w-full mb-3 p-2 border border-gray-300 rounded-lg"></textarea>
        <select id="eventType" class="w-full mb-3 p-2 border border-gray-300 rounded-lg">
          <option value="reunion">Reunion</option><option value="webinar">Webinar</option><option value="gala">Gala</option>
        </select>
        <div class="flex justify-end gap-3">
          <button onclick="closeEventModal()" class="px-4 py-2 border border-gray-300 rounded-full">Cancel</button>
          <button onclick="createEvent()" class="btn-primary">Create</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
